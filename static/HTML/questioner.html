<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Study Buddy — Questioner</title>
    <link rel="stylesheet" href="../CSS/shared.css">
    <link rel="stylesheet" href="../CSS/questioner.css">
</head>
<body>

<div class="app-shell">
    
    <!-- SIDEBAR OVERLAY (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <!-- Exact same sidebar as dashboard.html -->
        <a href="dashboard.html" class="sidebar-logo">
            <div class="logo-mark">SB</div>
            <div class="logo-text">Study Buddy</div>
        </a>

        <div class="sidebar-nav">
            <div class="nav-section-label">Menu</div>
            <a href="dashboard.html" class="nav-link">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M19 21H5a1 1 0 0 1-1-1v-9H1l10.327-9.388a1 1 0 0 1 1.346 0L23 11h-3v9a1 1 0 0 1-1 1zM6 19h12V9.157l-6-5.454l-6 5.454z"/></svg>
                </div>
                Home
            </a>
            
            <a href="dashboard.html#uploadBox" class="nav-link">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M3 19h18v2H3zM13 5.828V17h-2V5.828L4.929 11.9l-1.414-1.414L12 2l8.485 8.485l-1.414 1.414z"/></svg>
                </div>
                Upload
            </a>

            <a href="questioner.html" class="nav-link active">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10s-4.477 10-10 10m-1-7v2h2v-2zm2-1.645A3.502 3.502 0 0 0 12 6.5a3.501 3.501 0 0 0-3.433 2.813l1.962.393A1.5 1.5 0 1 1 12 11.5a1 1 0 0 0-1 1V14h2z"/></svg>
                </div>
                Questioner
            </a>

            <a href="summarize.html" class="nav-link">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M3 4h18v2H3zm0 7h18v2H3zm0 7h14v2H3z"/></svg>
                </div>
                Summarize
            </a>

            <a href="chat.html" class="nav-link">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M6.455 19L2 22.5V4a1 1 0 0 1 1-1h18a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1zm-.692-2H20V5H4v13.385zM8 9h8v2H8z"/></svg>
                </div>
                Chat with AI
            </a>

            <div class="nav-section-label" style="margin-top: 10px;">Account</div>

            <a href="profile.html" class="nav-link">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M4 22a8 8 0 1 1 16 0h-2a6 6 0 1 0-12 0zm8-9c-3.315 0-6-2.685-6-6s2.685-6 6-6s6 2.685 6 6s-2.685 6-6 6m0-2c2.21 0 4-1.79 4-4s-1.79-4-4-4s-4 1.79-4 4s1.79 4 4 4"/></svg>
                </div>
                My Profile
            </a>
        </div>

        <div class="sidebar-footer">
            <button class="theme-toggle" id="themeToggle">
                <div class="nav-icon" id="themeIcon"></div>
                <span id="themeText">Dark Mode</span>
            </button>
            <button class="btn-logout-side" onclick="handleLogout()">
                <div class="nav-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M4 18h2v2h12V4H6v2H4V3a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1zm6-7h6v2h-6v3l-5-4l5-4z"/></svg>
                </div>
                Logout
            </button>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="content">
        <header class="topbar">
            <button class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </button>
            <div class="topbar-title">AI Questioner</div>
        </header>

        <div class="page-content">
            <div class="questioner-layout">
                <!-- CONTROLS WIDGET -->
                <div class="card controls-widget">
                    <h2 class="section-title">Generate a Quiz</h2>
                    <p class="text-muted" style="margin-bottom: 20px; font-size: 0.9rem;">Test your knowledge based on your uploaded documents.</p>
                    
                    <div id="message" class="msg-box"></div>

                    <div class="form-group">
                        <label>Select Document</label>
                        <select id="docSelect" class="styled-select">
                            <option value="">Loading documents...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Number of Questions</label>
                        <select id="numQuestions" class="styled-select">
                            <option value="3">3 Questions (Quick Test)</option>
                            <option value="5" selected>5 Questions (Standard)</option>
                            <option value="10">10 Questions (Deep Dive)</option>
                        </select>
                    </div>

                    <button class="btn btn-primary" id="generateBtn" style="width: 100%; justify-content: center; margin-top: 10px;">
                        <span>Generate Quiz</span>
                        <div class="action-icon" style="width:20px; height:20px; background:none;">✨</div>
                    </button>
                </div>

                <!-- CARDS AREA -->
                <div class="cards-area">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon text-purple">📝</div>
                        <h3>Ready to learn?</h3>
                        <p>Select a document and hit Generate to create AI flashcards.</p>
                    </div>

                    <div id="quizContainer" class="quiz-container" style="display: none;">
                        <!-- Quiz Cards Injected here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

</div>

<script src="../JavaScript/shared.js"></script>
<script src="../JavaScript/questioner.js"></script>

</body>
</html>
