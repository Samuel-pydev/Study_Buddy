<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Study Buddy — My Documents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../CSS/dashboard.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="wordmark">
      <span class="dot"></span>
      Study Buddy
    </div>
    <div class="nav-right">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">

    <!-- UPLOAD SECTION -->
    <div class="section-header">
      <div>
        <h2 class="section-title">Upload a document</h2>
        <p class="section-sub">PDF files only — your material stays private</p>
      </div>
    </div>

    <div id="message" class="msg"></div>

    <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="upload-title">Drop your PDF here</p>
      <p class="upload-sub">or click to browse files</p>
      <button class="btn-upload" id="uploadBtn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Choose File</button>
      <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleUpload(event)" />
    </div>

    <!-- DOCUMENTS SECTION -->
    <div class="section-header">
      <div>
        <h2 class="section-title">My Documents</h2>
        <p class="section-sub">Select a document to start a conversation</p>
      </div>
    </div>

    <div class="docs-list" id="docsList">
      <div class="empty-state">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <p class="empty-title">No documents yet</p>
        <p class="empty-sub">Upload your first PDF above to get started</p>
      </div>
    </div>

  </div>

  <script src="../JavaScript/dashboard.js"></script>
</body>
</html>
