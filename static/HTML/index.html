
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Buddy — Learn Deeper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet" />
   <link rel="stylesheet" href="../CSS/index.css">
</head>
<body>

  <!-- Theme toggle -->
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <!-- Moon (shown in dark mode) -->
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--toggle-icon)">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
    </svg>
    <!-- Sun (shown in light mode) -->
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--toggle-icon)">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/>
      <line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/>
      <line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <div class="wrap">

    <!-- LEFT -->
    <div class="left">
      <div class="grid-overlay"></div>

      <div class="wordmark">
        <span class="dot"></span>
        Study Buddy
      </div>

      <div class="brand-body">
        <p class="eyebrow">AI-Powered Learning</p>
        <h1 class="headline">Your documents.<br><em>Your answers.</em></h1>
        <p class="sub">Upload your study material and get precise answers grounded in what you're actually learning — no hallucinations, no guesswork.</p>
      </div>

      <div class="tag">
        <span class="tag-line"></span>
        <span class="tag-text">Private by default &mdash; your files stay yours</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- RIGHT -->
    <div class="right">
      <div class="form-wrap">
        <h2 class="form-title" id="fTitle">Welcome back</h2>
        <p class="form-sub" id="fSub">Sign in to pick up where you left off</p>

        <div class="tabs">
          <button class="tab active" onclick="switchTab('login')">Sign in</button>
          <button class="tab" onclick="switchTab('signup')">Create account</button>
        </div>

        <div class="msg" id="msg"></div>

        <div class="fields">
          <div class="field">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@university.edu" autocomplete="email" />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <button class="btn" id="submitBtn" onclick="handleSubmit()">Sign in</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../JavaScript/index.js"></script>
</body>
</html>
