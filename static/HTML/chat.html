<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Study Buddy — Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/chat.css">

</head>
<body>
<div class="page">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-left">
            <button class="btn-back" onclick="window.location.href='/static/dashboard.html'">←</button>
            <div>
                <div class="doc-name" id="docName">Loading...</div>
            </div>
        </div>
        <div class="doc-badge">✦ AI Chat</div>
    </nav>

    <!-- CHAT AREA -->
    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💬</div>
            <div class="empty-title">Ask me anything!</div>
            <p class="empty-subtitle">I'll answer based on your document. Try asking about a specific topic or concept.</p>
        </div>
    </div>

    <!-- INPUT BAR -->
    <div class="input-bar">
        <input 
            type="text" 
            id="questionInput" 
            placeholder="Ask a question..." 
            onkeydown="if(event.key === 'Enter') sendMessage()"
        />
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

</div>
<script src="../JavaScript/chat.js" ></script>

</body>
</html>
