<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Study Buddy — My Documents</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #0a0a0f;
        --surface: #111118;
        --border: #1e1e2e;
        --accent: #7c6af7;
        --accent2: #f76a8a;
        --text: #e8e8f0;
        --muted: #6b6b80;
        --success: #4ade80;
        --error: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    /* NAVBAR */
    .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .logo {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: -0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logo-dot {
        width: 8px; height: 8px;
        background: var(--accent);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.5); opacity: 0.6; }
    }

    .btn-logout {
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
    }

    .btn-logout:hover { border-color: var(--error); color: var(--error); }
    .btn-logout:active { transform: scale(0.97); }

    /* BREADCRUMB */
    .breadcrumb {
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        background: var(--bg);
    }

    .breadcrumb span { color: var(--text); }
    .breadcrumb .sep { color: var(--border); }

    /* MAIN */
    .main {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px 24px 80px;
    }

    /* SECTION TITLE */
    .section-title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        letter-spacing: -0.3px;
        margin-bottom: 4px;
    }

    .section-subtitle {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 16px;
    }

        /* UPLOAD BOX */
    .upload-box {
        border: 2px dashed var(--border);
        border-radius: 16px;
        padding: 40px 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 32px;
        background: var(--surface);
        position: relative;
    }

    .upload-box:hover, .upload-box.dragover {
        border-color: var(--accent);
        background: rgba(124,106,247,0.05);
    }

    .upload-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
    }

    .upload-title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 6px;
    }

    .upload-subtitle {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 16px;
    }

    .btn-upload {
        padding: 10px 24px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, var(--accent), #6a5af9);
        color: white;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
        -webkit-tap-highlight-color: transparent;
    }

    .btn-upload:active { transform: scale(0.97); }
    .btn-upload:disabled { opacity: 0.6; cursor: not-allowed; }

    /* DOCUMENT CARDS */
    .docs-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .doc-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.2s;
    }

    .doc-card:hover { border-color: var(--accent); }

    .doc-icon {
        width: 40px; height: 40px;
        background: rgba(124,106,247,0.1);
        border: 1px solid rgba(124,106,247,0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        flex-shrink: 0;
    }

    .doc-info { flex: 1; min-width: 0; }

    .doc-name {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 4px;
    }

    .doc-meta {
        color: var(--muted);
        font-size: 0.775rem;
    }

    .btn-chat {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, var(--accent), #6a5af9);
        color: white;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
        -webkit-tap-highlight-color: transparent;
    }

    .btn-chat:active { transform: scale(0.97); }

    /* EMPTY STATE */
    .empty-state {
        text-align: center;
        padding: 40px 24px;
        color: var(--muted);
    }

    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* MESSAGE */
    .message {
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.875rem;
        margin-bottom: 16px;
        display: none;
        align-items: center;
        gap: 8px;
    }

    .message.error {
        background: rgba(248,113,113,0.1);
        border: 1px solid rgba(248,113,113,0.2);
        color: var(--error);
        display: flex;
    }

    .message.success {
        background: rgba(74,222,128,0.1);
        border: 1px solid rgba(74,222,128,0.2);
        color: var(--success);
        display: flex;
    }

    /* SPINNER */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
        width: 15px; height: 15px;
        border: 2px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
    }

    /* DESKTOP */
    @media (min-width: 768px) {
        .navbar { padding: 16px 40px; }
        .breadcrumb { padding: 12px 40px; }
        .main { padding: 32px 40px 80px; }
        .btn-upload:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(124,106,247,0.4);
        }
    }
</style>

</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <div class="logo-dot"></div>
            Study Buddy
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </nav>

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        Study Buddy <span class="sep">›</span> <span>My Documents</span>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- UPLOAD -->
        <div style="margin-bottom: 32px;">
            <h2 class="section-title">Upload Document</h2>
            <p class="section-subtitle">Upload a PDF to start asking questions</p>

            <div id="message" class="message"></div>

            <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">

                    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24"><g fill="#fff"><path d="m12 2l.117.007a1 1 0 0 1 .876.876L13 3v4l.005.15a2 2 0 0 0 1.838 1.844L15 9h4l.117.007a1 1 0 0 1 .876.876L20 10v9a3 3 0 0 1-2.824 2.995L17 22H7a3 3 0 0 1-2.995-2.824L4 19V5a3 3 0 0 1 2.824-2.995L7 2zm0 9l-.09.004l-.058.007l-.118.025l-.105.035l-.113.054l-.111.071a1 1 0 0 0-.112.097l-2.5 2.5a1 1 0 0 0 0 1.414l.094.083a1 1 0 0 0 1.32-.083l.793-.793V18a1 1 0 0 0 2 0v-3.585l.793.792a1 1 0 0 0 1.414-1.414l-2.5-2.5l-.082-.073l-.104-.074l-.098-.052l-.11-.044l-.112-.03l-.126-.017z"/><path d="M19 7h-4l-.001-4.001z"/></g></svg>

                </div>
                <div class="upload-title">Tap to upload a PDF</div>
                <div class="upload-subtitle">or drag and drop here</div>
                <button class="btn-upload" id="uploadBtn">Choose File</button>
                <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="handleUpload(event)" />
            </div>
        </div>

        <!-- DOCUMENTS -->
        <div>
            <h2 class="section-title">My Documents</h2>
            <p class="section-subtitle">Click chat to start asking questions</p>
            <div class="docs-list" id="docsList">
                <div class="empty-state">
                    <div class="empty-icon">

                        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 16 16"><path fill="#fff" d="M9 4.5V1H5.5A1.5 1.5 0 0 0 4 2.5v2.707A5.5 5.5 0 0 1 8.663 15H12.5a1.5 1.5 0 0 0 1.5-1.5V6h-3.5A1.5 1.5 0 0 1 9 4.5m1 0V1.25L13.75 5H10.5a.5.5 0 0 1-.5-.5M2.318 7.318a4.5 4.5 0 1 0 6.364 6.364a4.5 4.5 0 0 0-6.364-6.364m4.95 4.95a.5.5 0 0 1-.707 0L5.5 11.208l-1.06 1.06a.5.5 0 0 1-.708-.707l1.06-1.061l-1.06-1.06a.5.5 0 0 1 .707-.708L5.5 9.792l1.06-1.06a.5.5 0 0 1 .708.707L6.208 10.5l1.06 1.06a.5.5 0 0 1 0 .708"/></svg>

                    </div>
                    <p>No documents yet.<br>Upload your first PDF above!</p>
                </div>
            </div>
        </div>

    </div>

    <script>
    const API = 'http://127.0.0.1:8000';
    const token = localStorage.getItem('token');

    // Redirect to login if not logged in
    if (!token) window.location.href = '/static/index.html';

    // Track uploaded documents in localStorage
    let docs = JSON.parse(localStorage.getItem('docs') || '[]');

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = `message ${type}`;
    }

    function hideMessage() {
        document.getElementById('message').className = 'message';
    }

    function renderDocs() {
        const list = document.getElementById('docsList');
        if (docs.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        
                        <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 16 16"><path fill="#fff" d="M9 4.5V1H5.5A1.5 1.5 0 0 0 4 2.5v2.707A5.5 5.5 0 0 1 8.663 15H12.5a1.5 1.5 0 0 0 1.5-1.5V6h-3.5A1.5 1.5 0 0 1 9 4.5m1 0V1.25L13.75 5H10.5a.5.5 0 0 1-.5-.5M2.318 7.318a4.5 4.5 0 1 0 6.364 6.364a4.5 4.5 0 0 0-6.364-6.364m4.95 4.95a.5.5 0 0 1-.707 0L5.5 11.208l-1.06 1.06a.5.5 0 0 1-.708-.707l1.06-1.061l-1.06-1.06a.5.5 0 0 1 .707-.708L5.5 9.792l1.06-1.06a.5.5 0 0 1 .708.707L6.208 10.5l1.06 1.06a.5.5 0 0 1 0 .708"/></svg>

                        </div>
                    <p>No documents yet.<br>Upload your first PDF Tve!</p>
                </div>`;
            return;
        }
        list.innerHTML = docs.map(doc => `
            <div class="doc-card">
                <div class="doc-icon"> 
                    
                    <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24"><g fill="#fff"><path d="m12 2l.117.007a1 1 0 0 1 .876.876L13 3v4l.005.15a2 2 0 0 0 1.838 1.844L15 9h4l.117.007a1 1 0 0 1 .876.876L20 10v9a3 3 0 0 1-2.824 2.995L17 22H7a3 3 0 0 1-2.995-2.824L4 19V5a3 3 0 0 1 2.824-2.995L7 2zm0 9l-.09.004l-.058.007l-.118.025l-.105.035l-.113.054l-.111.071a1 1 0 0 0-.112.097l-2.5 2.5a1 1 0 0 0 0 1.414l.094.083a1 1 0 0 0 1.32-.083l.793-.793V18a1 1 0 0 0 2 0v-3.585l.793.792a1 1 0 0 0 1.414-1.414l-2.5-2.5l-.082-.073l-.104-.074l-.098-.052l-.11-.044l-.112-.03l-.126-.017z"/><path d="M19 7h-4l-.001-4.001z"/></g></svg>

                    </div>
                <div class="doc-info">
                    <div class="doc-name">${doc.filename}</div>
                    <div class="doc-meta">${doc.chunks} chunks · ${doc.date}</div>
                </div>
                <button class="btn-chat" onclick="openChat('${doc.filename}')">Chat →</button>
            </div>
        `).join('');
    }

    async function handleUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
    

        hideMessage();
        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Uploading...';

        const formData = new FormData();
        formData.append('uploaded', file);

        try {
            const res = await fetch(`${API}/documents/upload`, {
                method: 'POST',
                headers: { 'authorization': `Bearer ${token}` },
                body: formData
            });


            const data = await res.json();

            console.log('Error details:', data)

            if (!res.ok) {
                showMessage(data.detail || 'Upload failed', 'error');
                return;
            }

            // Save to local docs list
            docs.push({
                filename: data.filename,
                chunks: data.chunks,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('docs', JSON.stringify(docs));

            showMessage(`✓ ${data.filename} uploaded successfully!`, 'success');
            renderDocs();

        } catch (err) {
            showMessage('Could not connect to server', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Choose File';
            event.target.value = '';
        }

        

    }

    function openChat(filename) {
        localStorage.setItem('current_doc', filename);
        window.location.href = '/static/chat.html';
    }

    async function logout() {
        try {
            await fetch(`${API}/auth/logout`, {
                method: 'POST',
                headers: { 'authorization': `Bearer ${token}` }
            });
        } catch (err) {}
        localStorage.clear();
        window.location.href = '/static/index.html';
    }

    // Drag and drop
    const uploadBox = document.getElementById('uploadBox');
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('dragover');
    });
    uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('dragover'));
    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type === 'application/pdf') {
            const input = document.getElementById('fileInput');
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            handleUpload({ target: input });
        } else {
            showMessage('Please upload a PDF file only', 'error');
        }
    });

    // Initial render
    renderDocs();
</script>

</body>
</html>
